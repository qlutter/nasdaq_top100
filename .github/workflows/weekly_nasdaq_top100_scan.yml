name: Weekly Nasdaq Top 100 Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * 5"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Nasdaq Top 100 scanner
        run: |
          python support_resistance_scanner.py \
            --universe nasdaq_top100 \
            --top-n 100 \
            --period 2y \
            --interval 1d \
            --output-dir results/nasdaq_top100 \
            --chunk-size 60 \
            --pause-seconds 0.35 \
            --charts-limit 80 \
            --full-scan-limit 0 \
            --nasdaq-cap-workers 12

      - name: Upload Nasdaq Top 100 results
        uses: actions/upload-artifact@v4
        with:
          name: weekly-nasdaq-top100-results
          path: results/nasdaq_top100/
          retention-days: 21
